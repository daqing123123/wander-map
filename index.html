<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 美食美景取景地地图</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<style>
/* ==========================================
   DESIGN SYSTEM — Wanderlust Journal
   ========================================== */
:root {
  --bg: #FAF5EE;
  --surface: #FFFFFF;
  --text-primary: #2D2420;
  --text-secondary: #7A6E64;
  --text-muted: #B8A99A;
  --accent-food: #E86A4A;
  --accent-food-light: #FFF0EB;
  --accent-scenic: #4A9E73;
  --accent-scenic-light: #EDF7F1;
  --accent-location: #7B5DA8;
  --accent-location-light: #F4F0F9;
  --border: #E8DDD4;
  --shadow-sm: 0 1px 3px rgba(45,36,32,0.06);
  --shadow-md: 0 4px 16px rgba(45,36,32,0.08);
  --shadow-lg: 0 8px 32px rgba(45,36,32,0.12);
  --shadow-xl: 0 16px 48px rgba(45,36,32,0.16);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-full: 9999px;
  --glass-bg: rgba(255,255,255,0.88);
  --glass-blur: saturate(180%) blur(18px);
  --font-display: 'Georgia', 'Noto Serif SC', 'STSong', serif;
  --font-body: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --transition-slow: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Reset */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
}

/* ==========================================
   MAP CONTAINER
   ========================================== */
#map {
  position: fixed;
  inset: 0;
  z-index: 1;
}

/* ==========================================
   HEADER — Floating Glass Bar
   ========================================== */
.app-header {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px 10px 20px;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  box-shadow: var(--shadow-md);
  max-width: calc(100vw - 32px);
  flex-wrap: nowrap;
  overflow-x: auto;
  transition: all var(--transition);
}

.app-header:hover {
  box-shadow: var(--shadow-lg);
}

.header-logo {
  font-family: var(--font-display);
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.header-logo .dot {
  display: inline-block;
  width: 7px;
  height: 7px;
  border-radius: 50%;
  margin: 0 2px;
  vertical-align: middle;
  position: relative;
  top: -2px;
}
.dot.food { background: var(--accent-food); }
.dot.scenic { background: var(--accent-scenic); }
.dot.location { background: var(--accent-location); }

.header-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  flex-shrink: 0;
}

/* Category Filter Pills */
.filter-group {
  display: flex;
  gap: 6px;
  flex-shrink: 0;
}

.filter-pill {
  padding: 7px 15px;
  border-radius: var(--radius-full);
  border: 1.5px solid var(--border);
  background: white;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
  user-select: none;
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--text-secondary);
}

.filter-pill:hover {
  border-color: #ccc;
  transform: translateY(-1px);
}

.filter-pill.active {
  color: white;
  border-color: transparent;
  font-weight: 600;
}

.filter-pill-food.active { background: var(--accent-food); }
.filter-pill-scenic.active { background: var(--accent-scenic); }
.filter-pill-location.active { background: var(--accent-location); }

.filter-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.filter-dot-food { background: var(--accent-food); }
.filter-dot-scenic { background: var(--accent-scenic); }
.filter-dot-location { background: var(--accent-location); }
.filter-pill.active .filter-dot { background: rgba(255,255,255,0.6); }

/* Add Button */
.btn-add {
  padding: 9px 20px;
  background: var(--text-primary);
  color: white;
  border: none;
  border-radius: var(--radius-full);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: all var(--transition);
  flex-shrink: 0;
  font-family: var(--font-body);
  letter-spacing: 0.01em;
}

.btn-add:hover {
  background: #4A3F3A;
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}

.btn-add:active {
  transform: scale(0.97);
}

/* ==========================================
   PINS COUNT — Floating Badge
   ========================================== */
.pins-count {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 999;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border: 1px solid var(--border);
  border-radius: var(--radius-full);
  padding: 8px 16px;
  font-size: 12px;
  color: var(--text-secondary);
  box-shadow: var(--shadow-sm);
  pointer-events: none;
}

/* ==========================================
   ADD MODAL
   ========================================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(45,36,32,0.35);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}

.modal-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.modal {
  background: var(--surface);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-xl);
  width: 440px;
  max-width: calc(100vw - 32px);
  max-height: 85vh;
  overflow-y: auto;
  transform: translateY(20px) scale(0.96);
  transition: transform var(--transition-slow);
}

.modal-overlay.show .modal {
  transform: translateY(0) scale(1);
}

.modal-header {
  padding: 24px 24px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.modal-header h2 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.modal-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: #F5F0EC;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all var(--transition);
}

.modal-close:hover {
  background: #EBE4DD;
  color: var(--text-primary);
}

.modal-body {
  padding: 20px 24px 24px;
}

/* Form Styles */
.form-group {
  margin-bottom: 18px;
}

.form-label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 6px;
  letter-spacing: 0.02em;
}

.form-input,
.form-textarea {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: var(--font-body);
  color: var(--text-primary);
  background: #FCFAF7;
  transition: all var(--transition);
  outline: none;
}

.form-input:focus,
.form-textarea:focus {
  border-color: var(--accent-scenic);
  box-shadow: 0 0 0 3px rgba(74,158,115,0.1);
  background: white;
}

.form-textarea {
  resize: vertical;
  min-height: 80px;
}

.form-input::placeholder,
.form-textarea::placeholder {
  color: var(--text-muted);
}

/* Category Selector */
.category-selector {
  display: flex;
  gap: 8px;
}

.cat-option {
  flex: 1;
  padding: 11px 8px;
  border-radius: var(--radius-sm);
  border: 2px solid var(--border);
  background: white;
  cursor: pointer;
  text-align: center;
  font-size: 13px;
  font-weight: 500;
  transition: all var(--transition);
  user-select: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
}

.cat-option:hover {
  border-color: #ccc;
}

.cat-option .cat-icon { font-size: 22px; }

.cat-option.selected {
  border-color: transparent;
  color: white;
  font-weight: 600;
}

.cat-option-food.selected { background: var(--accent-food); }
.cat-option-scenic.selected { background: var(--accent-scenic); }
.cat-option-location.selected { background: var(--accent-location); }

/* Image Upload */
.upload-area {
  position: relative;
  border: 2px dashed var(--border);
  border-radius: var(--radius-md);
  padding: 32px 20px;
  text-align: center;
  cursor: pointer;
  transition: all var(--transition);
  background: #FCFAF7;
}

.upload-area:hover {
  border-color: var(--accent-scenic);
  background: var(--accent-scenic-light);
}

.upload-area.has-image {
  padding: 0;
  border: none;
  background: none;
}

.upload-icon {
  font-size: 36px;
  margin-bottom: 8px;
}

.upload-text {
  font-size: 13px;
  color: var(--text-secondary);
}

.upload-hint {
  font-size: 11px;
  color: var(--text-muted);
  margin-top: 4px;
}

.upload-preview {
  width: 100%;
  border-radius: var(--radius-sm);
  overflow: hidden;
  position: relative;
}

.upload-preview img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  display: block;
}

.upload-remove {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  transition: all var(--transition);
}

.upload-remove:hover {
  background: rgba(0,0,0,0.75);
}

/* Coordinates Display */
.coords-display {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  background: #F5F0EC;
  border-radius: var(--radius-sm);
  font-size: 13px;
  color: var(--text-secondary);
  font-family: monospace;
}

.coords-display .coord-emoji { font-size: 16px; }

/* Submit Button */
.btn-submit {
  width: 100%;
  padding: 13px;
  background: var(--text-primary);
  color: white;
  border: none;
  border-radius: var(--radius-sm);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  font-family: var(--font-body);
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.btn-submit:hover {
  background: #4A3F3A;
  transform: translateY(-1px);
}

.btn-submit:active {
  transform: scale(0.98);
}

.btn-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none;
}

/* Spinner */
.spinner {
  width: 18px;
  height: 18px;
  border: 2.5px solid rgba(255,255,255,0.3);
  border-top-color: white;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
  display: none;
}

.btn-submit.loading .spinner { display: block; }
.btn-submit.loading .submit-text { display: none; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ==========================================
   DETAIL PANEL — Slide from right
   ========================================== */
.detail-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: 400px;
  max-width: 100vw;
  height: 100vh;
  z-index: 1500;
  background: var(--surface);
  box-shadow: var(--shadow-xl);
  transform: translateX(105%);
  transition: transform var(--transition-slow);
  display: flex;
  flex-direction: column;
}

.detail-panel.show {
  transform: translateX(0);
}

.detail-image {
  width: 100%;
  height: 250px;
  object-fit: cover;
  flex-shrink: 0;
}

.detail-image-placeholder {
  width: 100%;
  height: 250px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 64px;
  color: white;
}

.detail-image-placeholder.food { background: linear-gradient(135deg, #E86A4A, #F59E7B); }
.detail-image-placeholder.scenic { background: linear-gradient(135deg, #4A9E73, #7BC8A4); }
.detail-image-placeholder.location { background: linear-gradient(135deg, #7B5DA8, #A78BFA); }

.detail-content {
  padding: 24px;
  overflow-y: auto;
  flex: 1;
}

.detail-category-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: var(--radius-full);
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 12px;
}

.detail-category-badge.food { background: var(--accent-food-light); color: var(--accent-food); }
.detail-category-badge.scenic { background: var(--accent-scenic-light); color: var(--accent-scenic); }
.detail-category-badge.location { background: var(--accent-location-light); color: var(--accent-location); }

.detail-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 700;
  color: var(--text-primary);
  margin-bottom: 12px;
  line-height: 1.3;
}

.detail-desc {
  font-size: 14px;
  color: var(--text-secondary);
  line-height: 1.7;
  margin-bottom: 20px;
}

.detail-meta {
  font-size: 12px;
  color: var(--text-muted);
  padding-top: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 6px;
}

.detail-close-btn {
  position: absolute;
  top: 16px;
  left: 16px;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.45);
  color: white;
  border: none;
  cursor: pointer;
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(8px);
  transition: all var(--transition);
  z-index: 1;
}

.detail-close-btn:hover {
  background: rgba(0,0,0,0.65);
}

/* Panel Backdrop */
.panel-backdrop {
  position: fixed;
  inset: 0;
  z-index: 1499;
  background: rgba(45,36,32,0.25);
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}

.panel-backdrop.show {
  opacity: 1;
  pointer-events: auto;
}

/* ==========================================
   LOADING & EMPTY STATES
   ========================================== */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 2001;
  background: rgba(250,245,238,0.9);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}

.loading-overlay.show {
  opacity: 1;
  pointer-events: auto;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--text-primary);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}

.loading-text {
  font-size: 14px;
  color: var(--text-secondary);
  font-family: var(--font-display);
}

/* Toast */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  z-index: 3000;
  padding: 12px 24px;
  background: var(--text-primary);
  color: white;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all var(--transition);
  white-space: nowrap;
  box-shadow: var(--shadow-lg);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

.toast.success { background: var(--accent-scenic); }
.toast.error { background: #E0533D; }

/* ==========================================
   LEAFLET OVERRIDES
   ========================================== */
.leaflet-control-zoom {
  border: none !important;
  box-shadow: var(--shadow-md) !important;
  border-radius: var(--radius-md) !important;
  overflow: hidden;
}

.leaflet-control-zoom a {
  width: 36px !important;
  height: 36px !important;
  line-height: 36px !important;
  font-size: 18px !important;
  color: var(--text-secondary) !important;
  background: white !important;
  border-bottom: 1px solid var(--border) !important;
}

.leaflet-control-zoom a:hover {
  background: #F5F0EC !important;
}

/* Marker Clusters (if using) */
.custom-marker {
  width: 40px !important;
  height: 40px !important;
  border-radius: 50% 50% 50% 0;
  transform: rotate(-45deg);
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  transition: transform 0.2s ease;
  cursor: pointer;
}

.custom-marker:hover {
  transform: rotate(-45deg) scale(1.15);
}

.custom-marker .marker-icon {
  transform: rotate(45deg);
  font-size: 18px;
  line-height: 1;
}

.custom-marker-food { background: var(--accent-food); }
.custom-marker-scenic { background: var(--accent-scenic); }
.custom-marker-location { background: var(--accent-location); }

/* ==========================================
   RESPONSIVE
   ========================================== */
@media (max-width: 640px) {
  .app-header {
    top: 10px;
    padding: 8px 10px 8px 14px;
    gap: 8px;
    border-radius: var(--radius-lg);
  }

  .header-logo { font-size: 15px; }
  .filter-pill { padding: 6px 10px; font-size: 12px; }
  .btn-add { padding: 8px 14px; font-size: 13px; }

  .detail-panel {
    width: 100vw;
  }

  .modal {
    width: calc(100vw - 32px);
    border-radius: var(--radius-md);
  }

  .modal-header h2 { font-size: 18px; }
  .pins-count {
    bottom: 16px;
    right: 16px;
  }
}
</style>
</head>
<body>

<!-- ==========================================
     MAP
     ========================================== -->
<div id="map"></div>

<!-- ==========================================
     HEADER
     ========================================== -->
<header class="app-header" id="appHeader">
  <span class="header-logo">
    🗺️ 美食美景地图
  </span>

  <span class="header-divider"></span>

  <div class="filter-group" id="filterGroup">
    <div class="filter-pill filter-pill-food active" data-cat="food" onclick="toggleFilter('food')">
      <span class="filter-dot filter-dot-food"></span> 美食
    </div>
    <div class="filter-pill filter-pill-scenic active" data-cat="scenic" onclick="toggleFilter('scenic')">
      <span class="filter-dot filter-dot-scenic"></span> 美景
    </div>
    <div class="filter-pill filter-pill-location active" data-cat="location" onclick="toggleFilter('location')">
      <span class="filter-dot filter-dot-location"></span> 取景地
    </div>
  </div>

  <button class="btn-add" id="btnAdd" onclick="openAddModal()">
    ✚ 添加地标
  </button>
</header>

<!-- ==========================================
     PINS COUNT
     ========================================== -->
<div class="pins-count" id="pinsCount">📍 加载中...</div>

<!-- ==========================================
     ADD MODAL
     ========================================== -->
<div class="modal-overlay" id="addModalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalTitle">📍 添加新地标</h2>
      <button class="modal-close" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- Category -->
      <div class="form-group">
        <label class="form-label">类别</label>
        <div class="category-selector">
          <div class="cat-option cat-option-food" data-cat="food" onclick="selectCategory('food')">
            <span class="cat-icon">🍜</span> 美食
          </div>
          <div class="cat-option cat-option-scenic" data-cat="scenic" onclick="selectCategory('scenic')">
            <span class="cat-icon">🏔️</span> 美景
          </div>
          <div class="cat-option cat-option-location" data-cat="location" onclick="selectCategory('location')">
            <span class="cat-icon">🎬</span> 取景地
          </div>
        </div>
      </div>

      <!-- Title -->
      <div class="form-group">
        <label class="form-label">标题</label>
        <input type="text" class="form-input" id="inputTitle" placeholder="比如：西湖醋鱼、稻城亚丁..." maxlength="80">
      </div>

      <!-- Description -->
      <div class="form-group">
        <label class="form-label">描述</label>
        <textarea class="form-textarea" id="inputDesc" placeholder="介绍一下这个地方的故事..." maxlength="500"></textarea>
      </div>

      <!-- Image Upload -->
      <div class="form-group">
        <label class="form-label">图片（选填）</label>
        <div class="upload-area" id="uploadArea" onclick="document.getElementById('inputImage').click()">
          <div class="upload-icon">📷</div>
          <div class="upload-text">点击上传照片</div>
          <div class="upload-hint">支持 JPG/PNG/WEBP，最大 5MB</div>
        </div>
        <input type="file" id="inputImage" accept="image/*" style="display:none" onchange="handleImageSelect(event)">
      </div>

      <!-- Coordinates -->
      <div class="form-group">
        <label class="form-label">坐标</label>
        <div class="coords-display">
          <span class="coord-emoji">📍</span>
          <span id="coordDisplay">点击地图选择位置</span>
        </div>
      </div>

      <!-- Submit -->
      <button class="btn-submit" id="btnSubmit" onclick="submitPin()">
        <span class="submit-text">✨ 添加到地图</span>
        <span class="spinner"></span>
      </button>
    </div>
  </div>
</div>

<!-- ==========================================
     DETAIL PANEL
     ========================================== -->
<div class="panel-backdrop" id="panelBackdrop" onclick="closeDetailPanel()"></div>
<div class="detail-panel" id="detailPanel">
  <button class="detail-close-btn" onclick="closeDetailPanel()">✕</button>
  <div id="detailImageContainer"></div>
  <div class="detail-content">
    <div class="detail-category-badge" id="detailBadge"></div>
    <h2 class="detail-title" id="detailTitle"></h2>
    <p class="detail-desc" id="detailDesc"></p>
    <div class="detail-meta" id="detailMeta"></div>
  </div>
</div>

<!-- ==========================================
     TOAST
     ========================================== -->
<div class="toast" id="toast"></div>

<!-- ==========================================
     LOADING
     ========================================== -->
<div class="loading-overlay show" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">正在加载地图...</div>
</div>

<!-- ==========================================
     SCRIPTS
     ========================================== -->
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<!-- Leaflet -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ==========================================
// CONFIGURATION — 部署前替换为你的 Supabase 信息
// ==========================================
const SUPABASE_URL = 'https://ezagywdqxfynllgteobt.supabase.co';        // 例如: https://xxxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_b4WwmTgj3W4BhQei9pmkug_DnQHNjZN'; // Supabase 项目设置 > API > anon key

// ==========================================
// STATE
// ==========================================
const state = {
  allPins: [],
  activeFilters: new Set(['food', 'scenic', 'location']),
  selectedCategory: 'food',
  pendingLatLng: null,
  selectedImageFile: null,
  map: null,
  markers: new Map(), // pinId → Leaflet marker
  supabase: null,
};

const CATEGORY_CONFIG = {
  food:    { label: '美食',   icon: '🍜', cls: 'food',    placeholderIcon: '🍜' },
  scenic:  { label: '美景',   icon: '🏔️', cls: 'scenic',  placeholderIcon: '🏔️' },
  location:{ label: '取景地', icon: '🎬', cls: 'location', placeholderIcon: '🎬' },
};

// ==========================================
// INIT
// ==========================================
function initSupabase() {
  if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
    showToast('⚠️ 请先在代码中配置 Supabase URL 和 Key', 'error');
    return false;
  }
  state.supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return true;
}

function initMap() {
  state.map = L.map('map', {
    center: [35.8617, 104.1954],
    zoom: 5,
    zoomControl: true,
    attributionControl: true,
  });

  // OpenStreetMap tiles
  L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
  }).addTo(state.map);

  // Click handler to set pending location
  state.map.on('click', (e) => {
    state.pendingLatLng = { lat: e.latlng.lat.toFixed(6), lng: e.latlng.lng.toFixed(6) };
    updateCoordDisplay();
  });
}

// ==========================================
// PINS — Fetch & Render
// ==========================================
async function loadPins() {
  if (!state.supabase) return;

  const { data, error } = await state.supabase
    .from('pins')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error('Failed to load pins:', error);
    showToast('加载失败，请检查配置', 'error');
    hideLoading();
    return;
  }

  state.allPins = data || [];
  renderMarkers();
  updatePinsCount();
  hideLoading();
}

function renderMarkers() {
  if (!state.map) return;

  // Clear existing markers
  state.markers.forEach(m => state.map.removeLayer(m));
  state.markers.clear();

  const filtered = state.allPins.filter(p => state.activeFilters.has(p.category));

  filtered.forEach(pin => {
    const config = CATEGORY_CONFIG[pin.category];
    const icon = L.divIcon({
      className: '',
      html: `<div class="custom-marker custom-marker-${config.cls}">
               <span class="marker-icon">${config.icon}</span>
             </div>`,
      iconSize: [40, 40],
      iconAnchor: [20, 40],
      popupAnchor: [0, -40],
    });

    const marker = L.marker([pin.lat, pin.lng], { icon })
      .addTo(state.map)
      .on('click', () => openDetailPanel(pin));

    state.markers.set(pin.id, marker);
  });
}

function updatePinsCount() {
  const filtered = state.allPins.filter(p => state.activeFilters.has(p.category));
  const el = document.getElementById('pinsCount');
  el.textContent = `📍 ${filtered.length} 个地标`;
}

// ==========================================
// ADD PIN
// ==========================================
function openAddModal() {
  state.selectedCategory = 'food';
  state.pendingLatLng = null;
  state.selectedImageFile = null;
  resetForm();
  document.getElementById('addModalOverlay').classList.add('show');
  selectCategoryUI('food');
  updateCoordDisplay();
}

function openAddModalAt(lat, lng) {
  state.pendingLatLng = { lat: lat.toFixed(6), lng: lng.toFixed(6) };
  openAddModal();
  updateCoordDisplay();
}

function closeAddModal() {
  document.getElementById('addModalOverlay').classList.remove('show');
  resetForm();
}

function selectCategory(cat) {
  state.selectedCategory = cat;
  selectCategoryUI(cat);
}

function selectCategoryUI(cat) {
  document.querySelectorAll('.cat-option').forEach(el => {
    el.classList.toggle('selected', el.dataset.cat === cat);
  });
}

function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 5 * 1024 * 1024) {
    showToast('图片不能超过 5MB', 'error');
    return;
  }

  state.selectedImageFile = file;

  // Show preview
  const reader = new FileReader();
  reader.onload = (ev) => {
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.classList.add('has-image');
    uploadArea.innerHTML = `
      <div class="upload-preview">
        <img src="${ev.target.result}" alt="预览">
        <button class="upload-remove" onclick="event.stopPropagation(); removeImage()">✕</button>
      </div>`;
  };
  reader.readAsDataURL(file);
}

function removeImage() {
  state.selectedImageFile = null;
  document.getElementById('inputImage').value = '';
  const uploadArea = document.getElementById('uploadArea');
  uploadArea.classList.remove('has-image');
  uploadArea.innerHTML = `
    <div class="upload-icon">📷</div>
    <div class="upload-text">点击上传照片</div>
    <div class="upload-hint">支持 JPG/PNG/WEBP，最大 5MB</div>`;
}

function resetForm() {
  document.getElementById('inputTitle').value = '';
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputImage').value = '';
  removeImage();
}

function updateCoordDisplay() {
  const el = document.getElementById('coordDisplay');
  if (state.pendingLatLng) {
    el.textContent = `${state.pendingLatLng.lat}, ${state.pendingLatLng.lng}`;
  } else {
    el.textContent = '点击地图选择位置';
  }
}

async function submitPin() {
  // Validate
  const title = document.getElementById('inputTitle').value.trim();
  if (!title) { showToast('请输入标题', 'error'); return; }

  if (!state.pendingLatLng) {
    showToast('请在地图上点击选择位置', 'error');
    return;
  }

  if (!state.supabase) {
    showToast('数据库未连接，请检查 Supabase 配置', 'error');
    return;
  }

  const btn = document.getElementById('btnSubmit');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    let imageUrl = '';

    // Upload image if selected
    if (state.selectedImageFile) {
      const fileExt = state.selectedImageFile.name.split('.').pop();
      const fileName = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}.${fileExt}`;

      const { error: uploadError } = await state.supabase.storage
        .from('pin-images')
        .upload(fileName, state.selectedImageFile, {
          cacheControl: '3600',
          upsert: false,
        });

      if (uploadError) throw uploadError;

      const { data: urlData } = state.supabase.storage
        .from('pin-images')
        .getPublicUrl(fileName);

      imageUrl = urlData.publicUrl;
    }

    // Insert pin
    const { error: insertError } = await state.supabase
      .from('pins')
      .insert({
        lat: parseFloat(state.pendingLatLng.lat),
        lng: parseFloat(state.pendingLatLng.lng),
        category: state.selectedCategory,
        title,
        description: document.getElementById('inputDesc').value.trim(),
        image_url: imageUrl,
      });

    if (insertError) throw insertError;

    showToast('✅ 添加成功！', 'success');
    closeAddModal();
    await loadPins(); // Refresh

  } catch (err) {
    console.error('Submit failed:', err);
    showToast('❌ 添加失败: ' + (err.message || '未知错误'), 'error');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

// ==========================================
// DETAIL PANEL
// ==========================================
function openDetailPanel(pin) {
  const panel = document.getElementById('detailPanel');
  const backdrop = document.getElementById('panelBackdrop');
  const config = CATEGORY_CONFIG[pin.category];

  // Image
  const imgContainer = document.getElementById('detailImageContainer');
  if (pin.image_url) {
    imgContainer.innerHTML = `<img class="detail-image" src="${pin.image_url}" alt="${pin.title}" />`;
  } else {
    imgContainer.innerHTML = `<div class="detail-image-placeholder ${config.cls}">${config.placeholderIcon}</div>`;
  }

  // Badge
  const badge = document.getElementById('detailBadge');
  badge.textContent = `${config.icon} ${config.label}`;
  badge.className = `detail-category-badge ${config.cls}`;

  // Content
  document.getElementById('detailTitle').textContent = pin.title;
  document.getElementById('detailDesc').textContent = pin.description || '暂无描述';

  // Meta
  const date = new Date(pin.created_at).toLocaleDateString('zh-CN', {
    year: 'numeric', month: 'long', day: 'numeric',
  });
  document.getElementById('detailMeta').innerHTML = `🕐 ${date}  ·  📍 ${pin.lat.toFixed(4)}, ${pin.lng.toFixed(4)}`;

  panel.classList.add('show');
  backdrop.classList.add('show');
}

function closeDetailPanel() {
  document.getElementById('detailPanel').classList.remove('show');
  document.getElementById('panelBackdrop').classList.remove('show');
}

// ==========================================
// FILTERS
// ==========================================
function toggleFilter(cat) {
  if (state.activeFilters.has(cat)) {
    state.activeFilters.delete(cat);
  } else {
    state.activeFilters.add(cat);
  }

  // Update UI
  document.querySelectorAll('.filter-pill').forEach(el => {
    el.classList.toggle('active', state.activeFilters.has(el.dataset.cat));
  });

  renderMarkers();
  updatePinsCount();
}

// ==========================================
// TOAST
// ==========================================
let toastTimer;
function showToast(msg, type = '') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ==========================================
// LOADING
// ==========================================
function hideLoading() {
  document.getElementById('loadingOverlay').classList.remove('show');
}

// ==========================================
// BOOTSTRAP
// ==========================================
window.addEventListener('DOMContentLoaded', async () => {
  try {
    if (!initSupabase()) {
      hideLoading();
      updatePinsCount();
      return;
    }
    initMap();

    // Override map click to also open modal with location
    state.map.on('click', (e) => {
      state.pendingLatLng = { lat: e.latlng.lat.toFixed(6), lng: e.latlng.lng.toFixed(6) };
      openAddModalAt(e.latlng.lat, e.latlng.lng);
    });

    await loadPins();
  } catch (err) {
    console.error('Init error:', err);
    hideLoading();
    showToast('初始化失败，请刷新重试', 'error');
  }
});

// Keyboard shortcut
window.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('addModalOverlay').classList.contains('show')) {
      closeAddModal();
    } else if (document.getElementById('detailPanel').classList.contains('show')) {
      closeDetailPanel();
    }
  }
});
</script>

</body>
</html>
